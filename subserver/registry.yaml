# XRK-AGT 多语言子服务注册表
# 契约：subserver/CONTRACT.md · 选型：subserver/LANGUAGES.md

runtimes:
  pyserver:
    language: python
    port: 8000
    path: subserver/pyserver
    start: "cd subserver/pyserver && uv run xrk"
    data: data/subserver

  goserver:
    language: go
    port: 8001
    path: subserver/goserver
    start: "cd subserver/goserver && go run ."
    data: data/goserver

  phpserver:
    language: php
    port: 8002
    path: subserver/phpserver
    start: "cd subserver/phpserver && php run.php"
    data: data/phpserver

  jserver:
    language: java
    framework: spring-boot
    port: 8003
    path: subserver/jserver
    start: "cd subserver/jserver && mvn -q spring-boot:run"
    data: data/jserver
    example_plugins:
      - datetime-tools
      - json-tools

  netserver:
    language: csharp
    framework: aspnet-core
    port: 8004
    path: subserver/netserver
    start: "cd subserver/netserver && dotnet run"
    data: data/netserver
    example_plugins:
      - uuid-tools

  rustserver:
    language: rust
    framework: axum
    port: 8005
    path: subserver/rustserver
    start: "cd subserver/rustserver && cargo run"
    data: data/rustserver
    example_plugins:
      - regex-tools
