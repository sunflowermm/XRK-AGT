name: doc-pipeline
displayName: 文档流水线
description: HTML/文本提取与 Markdown 转换（data/doc-pipeline/config.yaml）

schema:
  fields:
    max_chars:
      type: number
      label: 输出最大字符数
      min: 1000
      default: 500000
      component: InputNumber
    strip_scripts:
      type: boolean
      label: 剥离 script 标签
      default: true
      component: Switch
