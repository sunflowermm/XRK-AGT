# ============================================
# 火山引擎 LLM 配置（随端口变化）
# ============================================
# 豆包大模型，兼容 OpenAI Chat Completions。多模态（含识图）由模型自身完成。
# 位置：data/server_bots/{port}/volcengine_llm.yaml
# 文档：https://www.volcengine.com/docs/82379

# ----------------------------------------
# API 基础配置
# ----------------------------------------
# API基础地址（完整路径：https://ark.{region}.volces.com/api/v3）
# 注意：baseUrl 应包含 /api/v3，path 只需包含 /chat/completions
baseUrl: "https://ark.cn-beijing.volces.com/api/v3"
# API密钥（从火山引擎控制台获取：https://console.volcengine.com/ark）
apiKey: ""
# 区域（region），支持：cn-beijing（北京）、cn-shanghai（上海）等
# 如果设置了 region，会自动构建对应的 baseUrl
region: "cn-beijing"
# 接口路径（OpenAI 兼容格式）
# 完整端点：{baseUrl}/chat/completions
path: "/chat/completions"

# ----------------------------------------
# 模型配置
# ----------------------------------------
# 文本聊天模型（支持：doubao-pro-4k、doubao-pro-32k、doubao-lite-4k 等）
chatModel: "doubao-pro-4k"

# ----------------------------------------
# API 参数配置
# ----------------------------------------
# 温度参数（0-2），值越高越随机
temperature: 0.8
# 最大输出token数
maxTokens: 4096
# Token 字段名（火山引擎 max_tokens 与 max_completion_tokens 互斥）
# - max_tokens: 仅发送 max_tokens（推荐）
# - max_completion_tokens: 仅发送 max_completion_tokens
# - both: 同时发送两者（仅用于少数旧网关/自建兼容层，不推荐）
tokenField: "max_tokens"
# 深度思考（thinking.type），按官方文档可设置 disabled/enabled
thinkingType: "disabled"
# Top-p采样（0-1）
topP: 0.9
# 存在惩罚（-2.0到2.0），控制模型重复已出现的内容
presencePenalty: 0
# 频率惩罚（-2.0到2.0），控制模型重复高频词汇
frequencyPenalty: 0
# 请求超时时间（毫秒）
timeout: 360000

# ----------------------------------------
# Tool Calling（由系统自动注入 MCP tools，无需手写 tools 列表）
# ----------------------------------------
# 是否启用工具调用（默认启用）
enableTools: true
# 工具选择模式：auto / none / required（豆包支持）
toolChoice: "auto"
# 是否允许并行工具调用（豆包支持）
parallelToolCalls: true
# 多轮工具调用最大轮次（默认 7，给模型一定的纠错空间，仍有限制防止死循环）
maxToolRounds: 7

# ----------------------------------------
# Stream 流式输出配置
# ----------------------------------------
# 是否启用流式输出（默认启用）
# 只有当工厂和运营商都支持 stream 时，流式输出才会生效
enableStream: true

# ----------------------------------------
# 高级：额外请求头 / 请求体 / 代理配置
# ----------------------------------------
# 可选：为所有请求追加额外 Header（例如自定义追踪、网关要求的额外头）
headers: {}

# 可选：为请求体追加额外字段（会与系统生成的 body 合并，后写覆盖先写）
extraBody: {}

# 可选：仅为当前运营商配置 HTTP 代理（不会影响全局）
# 例如：
# proxy:
#   enabled: true
#   url: "http://127.0.0.1:7890"
proxy:
  enabled: false
  url: ""
