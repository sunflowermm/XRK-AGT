# ============================================
# 系统监控配置（全局）
# ============================================
# 全局配置，不随服务器端口变化。
# 位置：data/server_bots/monitor.yaml（首次由本模板引导复制）
# 企业安全档：默认只「观察 + 本进程 GC」。
# 代码硬约束：src/utils/monitor-safety.js（缺字段 / 旧 yaml 也不能打开副作用）
# 未注明单位均为毫秒。

# ----------------------------------------
# 总开关与间隔
# ----------------------------------------
# 监控总开关
enabled: true
# 检查间隔（毫秒），默认 5 分钟
interval: 300000

# ----------------------------------------
# 浏览器进程（扫描 / taskkill，企业默认关闭）
# ----------------------------------------
browser:
  # 启用以扫描并可能结束浏览器进程（易误伤桌面浏览器）
  enabled: false
  # 保留的最大托管实例数
  maxInstances: 5
  # 内存阈值（%），预留字段
  memoryThreshold: 90
  # 清理时优先保留最新启动的实例
  reserveNewest: true

# ----------------------------------------
# 内存
# ----------------------------------------
memory:
  # 启用内存监控
  enabled: true
  # 整机内存阈值（%）：仅告警，不驱动自动优化
  systemThreshold: 90
  # Node 堆阈值（%）：仅堆超此值才允许 autoOptimize
  nodeThreshold: 85
  # 自动优化：仅本进程 GC / 内部缓存，不改系统
  autoOptimize: true
  # 两次 GC 最小间隔（毫秒）
  gcInterval: 600000
  leakDetection:
    # 启用堆增长泄漏检测
    enabled: true
    # 相对基线增长比例（0.1 = 10%）视为潜在泄漏
    threshold: 0.1
    # 泄漏检测最小间隔（毫秒）
    checkInterval: 300000

# ----------------------------------------
# CPU
# ----------------------------------------
cpu:
  # 启用本进程 CPU 采样
  enabled: true
  # CPU 使用率告警阈值（%）
  threshold: 90
  # 单次采样窗口（毫秒）
  checkDuration: 30000

# ----------------------------------------
# 优化策略（副作用须显式打开）
# ----------------------------------------
optimize:
  # 激进模式；Windows 下配合 clearCache 才允许 flushdns
  aggressive: false
  # 严重时自动重启进程（企业默认禁止；仅认 Node 堆）
  autoRestart: false
  # 触发 autoRestart 的 Node 堆阈值（%）
  restartThreshold: 95

# ----------------------------------------
# 报告
# ----------------------------------------
report:
  # 启用周期报告（常规为 debug 一行）
  enabled: true
  # 报告间隔（毫秒）
  interval: 3600000

# ----------------------------------------
# 磁盘（默认识别空间；不自动删文件）
# ----------------------------------------
disk:
  # 启用磁盘空间探测 / 告警
  enabled: true
  # 清理临时文件（仅 data/temp，永不碰 uploads）
  cleanupTemp: false
  # 清理 logs 下过期 .log（不删 app.log 等活跃主日志）
  cleanupLogs: false
  # 临时文件最大保留（毫秒）
  tempMaxAge: 86400000
  # 日志文件最大保留（毫秒）
  logMaxAge: 604800000
  # 单日志文件大小上限（字节）；超限可删非保护名文件
  maxLogSize: 104857600

# ----------------------------------------
# 网络（netstat 开销大，企业默认关闭）
# ----------------------------------------
network:
  enabled: false
  # ESTABLISHED 连接数告警阈值
  maxConnections: 1000
  # 清理空闲连接（当前实现未强依赖，默认关）
  cleanupIdle: false

# ----------------------------------------
# 进程优先级（wmic / nice，企业默认关闭）
# ----------------------------------------
process:
  enabled: false
  # 目标优先级：low / normal / high
  priority: normal
  # Linux nice（-20～19）
  nice: 0

# ----------------------------------------
# 系统级动作（flushdns / chrt，企业默认关闭）
# ----------------------------------------
system:
  # 系统级动作总开关
  enabled: false
  # 清理系统缓存（如 flushdns）；Windows 另须 optimize.aggressive
  clearCache: false
  # 优化 CPU 调度（Linux chrt）
  optimizeCPU: false
