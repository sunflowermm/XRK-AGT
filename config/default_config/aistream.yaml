# ============================================
# AI 工作流配置（全局配置）
# ============================================
# 全局配置，不随服务器端口变化。控制工作流开关、LLM/ASR/TTS 厂商、MCP、子服务端等。
# 位置：data/server_bots/aistream.yaml
# 包含：工作流开关与目录、全局超时、缓存、LLM/ASR/TTS 厂商选择、MCP、Python 子服务端。

# ----------------------------------------
# 工作流系统
# ----------------------------------------
enabled: true
# 工作流发现：框架自动扫描所有 core/*/stream/*.js（见 StreamLoader），非单一目录。
# 本字段仅作文档/控制台备注，不参与加载路径解析；留空即可。
streamDir: ""

# ----------------------------------------
# 工作流全局
# ----------------------------------------
global:
  maxTimeout: 360000   # 单次执行最大超时（毫秒）
  debug: false
  maxConcurrent: 5     # 最大并发执行数

# ----------------------------------------
# 工作流缓存
# ----------------------------------------
cache:
  enabled: true
  ttl: 300             # 缓存过期时间（秒）
  maxSize: 100

# ----------------------------------------
# LLM 厂商
# ----------------------------------------
# 可选：volcengine、xiaomimimo、openai、openai_compat、gemini、anthropic、azure_openai。详细配置见 data/server_bots/{port}/*_llm.yaml
llm:
  Provider: volcengine
  timeout: 360000      # 请求超时（毫秒）
  retry:
    enabled: true
    maxAttempts: 3
    delay: 2000        # 重试间隔（毫秒）
    retryOn: ["timeout", "network", "5xx"]

# ----------------------------------------
# ASR 厂商
# ----------------------------------------
# 详细配置见 data/server_bots/{port}/volcengine_asr.yaml
asr:
  Provider: volcengine

# ----------------------------------------
# TTS 厂商
# ----------------------------------------
# 详细配置见 data/server_bots/{port}/volcengine_tts.yaml。onlyForASR：true 表示仅 ASR 触发时才 TTS
tts:
  Provider: volcengine
  onlyForASR: true

# ----------------------------------------
# MCP 服务
# ----------------------------------------
# Model Context Protocol：工具调用与跨平台集成。remote 可桥接外部 MCP（stdio/HTTP/SSE/WebSocket）。
mcp:
  enabled: true
  autoRegister: true
  remote:
    enabled: false
    # 远程 MCP 服务器配置（数组模式，推荐：每条粘贴一个 JSON 块）。
    # 示例（直接把社区 JSON 粘贴到 config 里）：
    #
    # mcpServers:
    #   - config:
    #       mcpServers:
    #         bing-search:
    #           command: npx
    #           args: ["-y", "bing-cn-mcp"]
    mcpServers: []
  # 默认工作流 & 远程 MCP 选择（供 /api/v3/chat/completions 在未传 workflow 字段时使用）
  # 默认留空：表示其它平台不显式选择时，仅按 provider 自身配置，不自动注入任何特定工作流/远程 MCP
  defaultStreams: []       # 例如 ["chat", "web", "browser", "tools", "desktop", "memory", "database"]
  defaultRemoteMcp: []     # 例如 ["github", "browser"]，对应 remote-mcp.github / remote-mcp.browser
  toolMergeStrategy: preferRequest  # 工具合并策略：preferRequest | preferStream | merge

# Agent 工作区上下文（Skills / Rules / OpenClaw 模板文件 / Memory / Subagents，注入到工作流 system prompt）
agentWorkspace:
  enabled: true
  root: ""                 # 留空=项目根；可填相对项目根的路径
  # 留空=全部；否则仅注入列出的入口：工作流 name（chat/web/desktop/tools…）+ v3（POST /api/v3/chat/completions）
  streams: []
  includeRules: true
  includeAgentMd: true
  includeSubagents: true
  # 0 = 不限制 prose 总长；Skills 仍受 maxSkillsPromptChars 约束
  maxTotalChars: 0
  contextFiles: []         # 额外注入的 Markdown 路径（相对工作区根）
  # 以下与 OpenClaw config skills.limits / 目录结构对齐（pi-coding-agent formatSkillsForPrompt）
  maxCandidatesPerRoot: 300
  maxSkillsLoadedPerSource: 200
  maxSkillsInPrompt: 150
  maxSkillsPromptChars: 30000
  maxSkillFileBytes: 256000
  customSkillRoots:
    - "standard-skills"
  # 自定义技能目录（可多个；相对工作区路径或绝对路径均可）。
  # 为空不注入 skills。示例：`.cursor/skills` 或 `C:/.../standard-skills`
  maxRulesChars: 12000
  maxAgentMdChars: 12000

# Embedding 全局配置（StreamLoader.applyEmbeddingConfig 合并到各工作流 embeddingConfig；RAG/知识库检索使用 similarityThreshold）
embedding:
  enabled: true
  maxContexts: 5
  similarityThreshold: 0.3

# 工具子系统（与 system.js aistream.schema.fields.tools 一一对应）
tools:
  # tools 工作流：文件/命令工作区（core/system-Core/stream/tools.js）
  file:
    workspace: ""              # 空=用户桌面；~/ 开头；绝对路径；或相对项目根
    maxReadChars: 500000       # read 返回正文最大字符，超出截断并标注
    grepMaxResults: 100
    runEnabled: true
    runTimeoutMs: 120000
    maxCommandOutputChars: 200000

# ----------------------------------------
# Python 子服务端
# ----------------------------------------
# 提供向量化、数据处理等，与主服务端分离部署。
subserver:
  host: "127.0.0.1"
  port: 8000
  timeout: 30000        # 毫秒

