# ============================================
# 小米 MiMo LLM 配置（随端口变化）
# ============================================
# 小米 MiMo 大模型，兼容 OpenAI Chat Completions，仅文本。
# 位置：data/server_bots/{port}/xiaomimimo_llm.yaml

# ----------------------------------------
# API 基础配置
# ----------------------------------------
# API基础地址
baseUrl: "https://api.xiaomimimo.com/v1"
# API密钥
apiKey: ""
# 认证方式（api-key 或 bearer）
authMode: "api-key"
# 接口路径
path: "/chat/completions"

# ----------------------------------------
# 模型配置
# ----------------------------------------
# 文本聊天模型（支持：mimo-v2-flash、mimo-v2 等）
chatModel: "mimo-v2-flash"

# ----------------------------------------
# API 参数配置
# ----------------------------------------
# 温度参数（0-2），值越高越随机
temperature: 0.7
# 最大输出token数（注意：MiMo 使用 max_completion_tokens）
maxTokens: 4096
# Token 字段名（MiMo 需要 max_completion_tokens）
tokenField: "max_completion_tokens"
# Top-p采样（0-1）
topP: 0.95
# 存在惩罚（-2.0到2.0）
presencePenalty: 0
# 频率惩罚（-2.0到2.0）
frequencyPenalty: 0
# 停止词（最多 4 个序列；为空表示不传 stop）
stop: []
# 思维链模式（thinking.type）
thinkingType: "disabled"
# 响应格式（MiMo 官方为 response_format 对象；此处只配置 type）
# - text: 文本（通常不需要显式设置）
# - json_object: 结构化 JSON（beta，按需）
responseFormat: ""
# 请求超时时间（毫秒）
timeout: 360000

# ----------------------------------------
# Tool Calling（由系统自动注入 MCP tools，无需手写 tools 列表）
# ----------------------------------------
enableTools: true
toolChoice: "auto"
# 最大工具调用轮次（默认 7，给模型一定的纠错空间，仍有限制防止死循环）
maxToolRounds: 7
# 是否允许并行工具调用（若服务端不支持会忽略）
parallelToolCalls: true

# ----------------------------------------
# Stream 流式输出配置
# ----------------------------------------
# 是否启用流式输出（默认启用）
# 只有当工厂和运营商都支持 stream 时，流式输出才会生效
enableStream: true

# ----------------------------------------
# 高级：额外请求头 / 请求体 / 代理配置
# ----------------------------------------
# 可选：为所有请求追加额外 Header（例如自定义追踪、网关要求的额外头）
headers: {}

# 可选：为请求体追加额外字段（会与系统生成的 body 合并，后写覆盖先写）
extraBody: {}

# 可选：仅为当前运营商配置 HTTP 代理（不会影响全局）
# 例如：
# proxy:
#   enabled: true
#   url: "http://127.0.0.1:7890"
proxy:
  enabled: false
  url: ""
