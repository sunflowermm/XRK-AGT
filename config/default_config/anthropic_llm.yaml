# ============================================
# Anthropic LLM 配置（随端口变化）
# ============================================
# Provider: anthropic。Claude / Messages API。
# 位置：data/server_bots/{port}/anthropic_llm.yaml

apiKey: ""

baseUrl: "https://api.anthropic.com/v1"
path: "/messages"

# 真实模型名（示例）
model: "claude-3-5-sonnet-latest"

# 生成参数（全部为可选，默认不下发，使用 Anthropic 自身默认）
# temperature: 0.7
# maxTokens: 4096
# topP: 1.0

# Anthropic 版本头（anthropic-version）
anthropicVersion: "2023-06-01"

# 工具调用：协议不同，默认关闭
enableTools: false

# 请求超时时间（毫秒）
timeout: 360000

# Stream 流式输出配置
# 是否启用流式输出（默认启用）
enableStream: true

# ----------------------------------------
# 高级：额外请求头 / 请求体字段
# ----------------------------------------
# 可选：为每次请求追加额外 Header（例如自定义追踪头）
# headers: { "X-Trace-Id": "anth-req-001" }
headers: {}
# 可选：原样合并到请求体顶层（高级用法）
# extraBody: { "metadata": { "scene": "dashboard" } }
extraBody: {}

# 代理配置（可选）
# 用于为 Anthropic 请求配置 HTTP(S) 代理
# 示例：
# proxy:
#   enabled: true
#   url: "http://127.0.0.1:7890"
proxy:
  enabled: false
  url: ""
