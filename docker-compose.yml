x-build-proxy: &build-proxy
  args:
    HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
    HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
    NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    PLAYWRIGHT_VERSION: ${PLAYWRIGHT_VERSION:-1.58.1}
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-subserver-net: &subserver-net
  restart: unless-stopped
  networks:
    - xrk-network

x-health-15s: &health-15s
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 15s

x-health-30s: &health-30s
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 30s

x-health-60s: &health-60s
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 60s

x-depends-datastores: &depends-datastores
  redis:
    condition: service_healthy
  mongodb:
    condition: service_healthy

x-depends-subservers: &depends-subservers
  xrk-subserver:
    condition: service_healthy
  xrk-subserver-go:
    condition: service_healthy
  xrk-subserver-php:
    condition: service_healthy
  xrk-subserver-java:
    condition: service_healthy
  xrk-subserver-net:
    condition: service_healthy
  xrk-subserver-rust:
    condition: service_healthy

services:
  xrk-agt:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${XRK_DOCKER_TARGET:-runtime}
      <<: *build-proxy
    image: xrk-agt:${XRK_DOCKER_TAG:-latest}
    container_name: xrk-agt
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --no-warnings --no-deprecation
      XRK_SERVER_PORT: ${XRK_SERVER_PORT:-8080}
      DOCKER_CONTAINER: "1"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost,redis,mongodb,xrk-agt,xrk-subserver,xrk-subserver-go,xrk-subserver-php,xrk-subserver-java,xrk-subserver-net,xrk-subserver-rust}
      SUBSERVER_PYSERVER_HOST: xrk-subserver
      SUBSERVER_GOSERVER_HOST: xrk-subserver-go
      SUBSERVER_PHPSERVER_HOST: xrk-subserver-php
      SUBSERVER_JSERVER_HOST: xrk-subserver-java
      SUBSERVER_NETSERVER_HOST: xrk-subserver-net
      SUBSERVER_RUSTSERVER_HOST: xrk-subserver-rust
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${XRK_SERVER_PORT:-8080}/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    ports:
      - "${XRK_SERVER_PORT:-8080}:${XRK_SERVER_PORT:-8080}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./resources:/app/resources
      - ./core:/app/core
    networks:
      - xrk-network
    depends_on:
      <<: [*depends-datastores, *depends-subservers]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    command: ["server"]

  xrk-subserver:
    image: xrk-agt:latest
    container_name: xrk-subserver
    <<: *subserver-net
    environment:
      NODE_ENV: production
      DOCKER_CONTAINER: "1"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      <<: *health-30s
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./core:/app/core
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          cpus: "0.2"
          memory: 256M
    command: ["subserver"]

  xrk-subserver-go:
    build:
      context: ./subserver/goserver
      dockerfile: Dockerfile
      <<: *build-proxy
    image: xrk-subserver-go:latest
    container_name: xrk-subserver-go
    <<: *subserver-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8001/health"]
      <<: *health-15s
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  xrk-subserver-php:
    build:
      context: ./subserver/phpserver
      dockerfile: Dockerfile
      <<: *build-proxy
    image: xrk-subserver-php:latest
    container_name: xrk-subserver-php
    <<: *subserver-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8002/health"]
      <<: *health-15s
    ports:
      - "8002:8002"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  xrk-subserver-java:
    build:
      context: ./subserver/jserver
      dockerfile: Dockerfile
      <<: *build-proxy
    image: xrk-subserver-java:latest
    container_name: xrk-subserver-java
    <<: *subserver-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8003/health"]
      <<: *health-60s
    ports:
      - "8003:8003"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  xrk-subserver-net:
    build:
      context: ./subserver/netserver
      dockerfile: Dockerfile
      <<: *build-proxy
    image: xrk-subserver-net:latest
    container_name: xrk-subserver-net
    <<: *subserver-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8004/health"]
      <<: *health-30s
    ports:
      - "8004:8004"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  xrk-subserver-rust:
    build:
      context: ./subserver/rustserver
      dockerfile: Dockerfile
      <<: *build-proxy
    image: xrk-subserver-rust:latest
    container_name: xrk-subserver-rust
    <<: *subserver-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8005/health"]
      <<: *health-60s
    ports:
      - "8005:8005"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: xrk-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - xrk-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  mongodb:
    image: mongo:8.0
    container_name: xrk-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-}
    volumes:
      - mongodb-data:/data/db
    networks:
      - xrk-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 128M

networks:
  xrk-network:
    driver: bridge

volumes:
  redis-data:
  mongodb-data:
