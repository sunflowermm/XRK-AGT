# 可选：外部 AI 渗透扫描（usestrix/strix）
# 文档：docs/security-strix.md
# 默认仅手动触发；需配置 Secrets: STRIX_LLM、LLM_API_KEY
name: Strix security (optional)

on:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'quick | standard | deep'
        required: true
        default: 'quick'
  # 需要每个 PR 自动扫时取消下面注释（会消耗 LLM 额度）
  # pull_request:

jobs:
  strix-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require Strix secrets
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$STRIX_LLM" ] || [ -z "$LLM_API_KEY" ]; then
            echo "::error::请配置仓库 Secrets: STRIX_LLM、LLM_API_KEY（见 docs/security-strix.md）"
            exit 1
          fi

      - name: Install Strix
        run: curl -sSL https://strix.ai/install | bash

      - name: Run Strix (owned repo only)
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SCAN_MODE: ${{ inputs.scan_mode || 'quick' }}
        run: |
          # PATH 通常由 install 脚本写入；CI 非交互 shell 再补一层常见路径
          export PATH="$HOME/.local/bin:$PATH"
          strix -n -t ./ --scan-mode "$SCAN_MODE"
