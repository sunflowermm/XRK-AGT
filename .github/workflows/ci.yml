name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test (fast)
        run: pnpm test:fast
      - name: Syntax-check runtime facade
        run: |
          node --check src/agent-runtime.js
          node --check src/infrastructure/http/runtime-auth.js
          node --check src/infrastructure/http/runtime-listen.js
          node --check src/infrastructure/http/runtime-ws.js
          node --check src/infrastructure/http/runtime-proxy.js
          node --check src/infrastructure/plugins/loader.js
          node --check src/infrastructure/ai-workflow/loader.js
